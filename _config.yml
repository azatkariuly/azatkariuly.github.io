# Setup
title: Azat Azamat
description: Master's Student at UNIST
url: https://azatkariuly.github.io
avatar: /avatar.PNG
paginate: 5
permalink: pretty
cover_image: /bg.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: azatkariuly
  card: summary
logo: logo.png
social:
  name: Azat Azamat
  links:
    - https://twitter.com/azatkariuly
    - https://github.com/azatkariuly
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Azat Azamat
  url: https://github.com/azatkariuly/
  email: azatkariuly@unist.ac.kr
